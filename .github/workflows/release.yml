name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: tar.gz }
          - { os: macos-latest,   target: x86_64-apple-darwin,      ext: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Version matches tag
        shell: bash
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "v$v" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} != Cargo.toml v$v"; exit 1
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin=pwsh-autoupdate
          dist="${bin}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/$bin.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/$bin" "$dist/"
          fi
          cp README* LICENSE* "$dist/" 2>/dev/null || true
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
            archive="$dist.zip"
          else
            tar czf "$dist.tar.gz" "$dist"
            archive="$dist.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            *.tar.gz
            *.zip
            *.sha256
