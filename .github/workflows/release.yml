name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: tar.gz }
          - { os: macos-latest,   target: x86_64-apple-darwin,      ext: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Version matches tag
        shell: bash
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "v$v" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} != Cargo.toml v$v"; exit 1
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin=pwsh-autoupdate
          dist="${bin}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/$bin.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/$bin" "$dist/"
          fi
          cp README* LICENSE* "$dist/" 2>/dev/null || true
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
            archive="$dist.zip"
          else
            tar czf "$dist.tar.gz" "$dist"
            archive="$dist.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            *.tar.gz
            *.zip
            *.sha256

  # Generate the Homebrew formula + Scoop manifest from the just-published
  # release (correct per-asset SHA256s), attach them to the release, and — when
  # the HOMEBREW_TAP_DEPLOY_KEY secret is configured — push the formula to the
  # tap repo over SSH so `brew` stays current automatically. The secret is a
  # deploy key scoped to ONLY the homebrew-tap repo (no account-wide access);
  # this job only runs on tag pushes, which forks cannot trigger, so the key is
  # never exposed to fork PRs. Without the secret it skips that step gracefully
  # (the manifest is still attached to the release).
  manifests:
    name: package-manager manifests
    needs: build
    runs-on: ubuntu-latest
    env:
      TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate manifests
        run: |
          mkdir -p dist
          bash scripts/gen-manifests.sh "${GITHUB_REF_NAME#v}" dist
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/pwsh-autoupdate.rb
            dist/pwsh-autoupdate.json
      - name: Update Homebrew tap
        if: ${{ env.TAP_DEPLOY_KEY != '' }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone git@github.com:mericstam/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp dist/pwsh-autoupdate.rb tap/Formula/pwsh-autoupdate.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pwsh-autoupdate.rb
          git commit -m "pwsh-autoupdate ${ver}" || { echo "tap already current"; exit 0; }
          git push
          rm -f ~/.ssh/tap_key
