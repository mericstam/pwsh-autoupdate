name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --release --verbose
      - name: test
        run: cargo test --verbose
      - name: verify single binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: test -x target/release/pwsh-autoupdate
      - name: verify single binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: test -x target/release/pwsh-autoupdate.exe

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories
