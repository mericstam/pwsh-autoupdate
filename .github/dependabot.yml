version: 2
updates:
  # Rust crate dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions — keeps the SHA-pinned actions in ci.yml / release.yml
  # current (Dependabot bumps the pin and updates the trailing version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
